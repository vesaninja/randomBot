<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Telegram WebApp</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 20px;
    }

    button {
      padding: 12px;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <h2>Choose an action</h2>

  <button onclick="sendData('button_1')">Button 1</button>
  <button onclick="sendData('button_2')">Button 2</button>
  <button onclick="sendData('button_3')">Button 3</button>
  <button onclick="sendData('button_4')">Button 4</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // expand to full height

    function sendData(value) {
      tg.sendData(JSON.stringify({
        action: value,
        timestamp: Date.now()
      }));
    }
  </script>
</body>
</html>
